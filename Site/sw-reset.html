<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1d4ed8">
    <meta name="robots" content="noindex">
    <title>JobBridge 업데이트 적용</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background: #f1f5f9;
        color: #0f172a;
        font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(560px, 100%);
        padding: 36px;
        border: 1px solid #dbe4f0;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #64748b;
        font-size: 18px;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 56px;
        margin-top: 28px;
        padding: 0 24px;
        border-radius: 14px;
        background: #3852d9;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JobBridge 업데이트를 적용하고 있어요</h1>
      <p>이전 버전 캐시를 정리한 뒤 최신 페이지로 자동 이동합니다. 잠시만 기다려 주세요.</p>
      <a href="./JobBridge.dc.html?reset-sw=1">수동으로 다시 열기</a>
    </main>
    <script>
      (function () {
        function clearServiceWorkers() {
          if (!("serviceWorker" in navigator)) return Promise.resolve();
          return navigator.serviceWorker.getRegistrations().then(function (registrations) {
            return Promise.all(registrations.map(function (registration) {
              return registration.unregister();
            }));
          });
        }

        function clearCaches() {
          if (!("caches" in window)) return Promise.resolve();
          return caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (key) {
              return caches.delete(key);
            }));
          });
        }

        Promise.allSettled([clearServiceWorkers(), clearCaches()]).finally(function () {
          try {
            sessionStorage.removeItem("jobbridge-sw-refresh-v11");
          } catch (error) {
            console.warn("[JobBridge] Failed to clear refresh marker", error);
          }
          window.location.replace("./JobBridge.dc.html?fresh=" + Date.now());
        });
      })();
    </script>
  </body>
</html>
