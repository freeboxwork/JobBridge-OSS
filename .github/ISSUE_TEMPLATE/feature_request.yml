name: 기능 제안
description: 이용자 문제와 기대 효과를 중심으로 개선을 제안해 주세요.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        해결하려는 문제와 영향을 받는 이용자를 먼저 설명해 주세요. 실제 사람의 장애·구직 정보를 사례로 공개하지 말고 합성 예시를 사용하세요.
  - type: checkboxes
    id: checks
    attributes:
      label: 사전 확인
      options:
        - label: 기존 이슈와 로드맵에서 같은 제안을 찾지 못했습니다.
          required: true
        - label: 제안에 실제 개인정보나 비밀값을 포함하지 않았습니다.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 현재 누가 어떤 상황에서 어려움을 겪는지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 동작
      description: 이용자 흐름과 완료 조건을 구체적으로 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 검토한 대안
      description: 더 단순한 해결이나 기존 기능으로 가능한지 적어 주세요.
  - type: textarea
    id: accessibility
    attributes:
      label: 접근성 영향
      description: 키보드, 스크린리더, 인지·시각·청각·운동 접근성에 미치는 영향을 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: 개인정보·보안 영향
      description: 새로 처리하는 정보, 저장 여부, 최소화 방법을 적어 주세요. 해당 없으면 이유를 적습니다.
    validations:
      required: true
  - type: textarea
    id: licensing
    attributes:
      label: 데이터·모델·외부 의존성
      description: 추가 자료나 서비스가 있다면 출처, 버전, 라이선스를 적어 주세요. 해당 없으면 “없음”으로 답합니다.
    validations:
      required: true
