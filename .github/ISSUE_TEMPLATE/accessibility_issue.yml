name: 접근성 문제
description: 키보드, 보조기술, 대비, 확대, 이해 가능성 문제를 알려 주세요.
title: "[A11y] "
labels:
  - accessibility
body:
  - type: markdown
    attributes:
      value: |
        접근 장벽을 알려 주셔서 감사합니다. 진단명이나 실제 프로필을 밝힐 필요가 없습니다. 원하는 범위에서 사용 환경과 막힌 작업만 설명해 주세요.
  - type: checkboxes
    id: privacy
    attributes:
      label: 개인정보 확인
      options:
        - label: 실제 개인정보, 장애 정보, 인증정보를 포함하지 않았습니다.
          required: true
  - type: textarea
    id: task
    attributes:
      label: 하려던 작업
      placeholder: 키보드만 사용해 추천 결과의 두 번째 공고 세부정보를 열려고 했습니다.
    validations:
      required: true
  - type: textarea
    id: barrier
    attributes:
      label: 경험한 장벽
      description: 어느 단계에서 무엇 때문에 진행할 수 없었는지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대한 접근 가능한 동작
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 관련 영역
      options:
        - 키보드와 초점
        - 스크린리더와 이름·역할·상태
        - 색상과 대비
        - 확대와 반응형 화면
        - 동작과 애니메이션
        - 자막·대체 텍스트
        - 오류와 이해 가능한 안내
        - 기타
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 사용 환경
      description: 공개해도 괜찮은 범위에서 브라우저, 운영체제, 보조기술과 버전을 적어 주세요.
      placeholder: Windows 11, Firefox, NVDA 2026.1
  - type: textarea
    id: wcag
    attributes:
      label: 관련 기준 또는 참고자료
      description: 알고 있다면 WCAG 성공기준이나 접근성 검사 결과를 적어 주세요. 몰라도 괜찮습니다.
  - type: textarea
    id: additional
    attributes:
      label: 추가 설명
      description: 개인정보를 지운 화면이나 짧은 녹화가 있다면 대체 설명과 함께 첨부해 주세요.
