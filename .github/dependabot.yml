version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    # The published model is serialized against exact ML versions. Routine
    # version bumps require retraining and artifact validation; GitHub security
    # alerts and security-update PRs remain enabled separately.
    open-pull-requests-limit: 0
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /Site
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      web-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:30"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
